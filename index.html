<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threshold — Physio Education Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --ink:#1E2A28;
    --ink-soft:#4A5654;
    --paper:#EEF0EA;
    --card:#FFFFFF;
    --teal:#2B5955;
    --teal-deep:#16302D;
    --amber:#DD7A3C;
    --coral:#C1503F;
    --sage:#5F8468;
    --line: rgba(30,42,40,0.14);
    --line-soft: rgba(30,42,40,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:36px 24px 90px;}

  /* HEADER */
  header{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:44px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand .mark{font-family:'Fraunces',serif;font-weight:700;font-size:28px;letter-spacing:-0.01em;color:var(--teal-deep);}
  .brand .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-soft);}

  /* DIAL SWITCHER */
  .dial-block{display:flex;align-items:center;gap:14px;}
  .dial-labels{display:flex;flex-direction:column;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-soft);gap:38px;text-align:right;}
  .dial-labels span.active{color:var(--teal-deep);font-weight:600;}
  #dial{cursor:pointer;}
  #dialNeedle{transform-origin:60px 60px;transition:transform .45s cubic-bezier(.34,1.4,.4,1);}
  .dial-ring{fill:none;stroke:var(--line);stroke-width:6;}
  .dial-arc{fill:none;stroke:var(--teal);stroke-width:6;stroke-linecap:round;transition:stroke .3s;}

  /* HERO */
  .hero{margin-bottom:52px;}
  .hero h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(32px,5vw,46px);line-height:1.08;letter-spacing:-0.015em;margin:0 0 14px;color:var(--teal-deep);}
  .hero p{font-size:16px;line-height:1.6;color:var(--ink-soft);max-width:560px;margin:0;}

  /* CONDITION GRID */
  .grid-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:52px;}
  .card{
    background:var(--card);border:1px solid var(--line-soft);border-radius:4px;
    padding:18px 16px;cursor:pointer;transition:border-color .2s, transform .2s;
    display:flex;flex-direction:column;gap:8px;
  }
  .card:hover{border-color:var(--teal);transform:translateY(-2px);}
  .card.selected{border-color:var(--teal);background:var(--teal-deep);}
  .card.selected .card-title, .card.selected .card-tag{color:var(--paper);}
  .card-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--sage);}
  .card-title{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--teal-deep);}

  /* DETAIL PANEL */
  .panel{background:var(--card);border:1px solid var(--line-soft);border-radius:4px;padding:36px;display:none;}
  .panel.visible{display:block;}
  .panel-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
  .panel-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:0;color:var(--teal-deep);}
  .mode-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:20px;border:1px solid var(--line);color:var(--ink-soft);}
  .mode-pill.patient{border-color:var(--sage);color:var(--sage);}
  .mode-pill.clinician{border-color:var(--amber);color:var(--amber);}

  .content-view{display:none;}
  .content-view.active{display:block;}

  .section-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-soft);margin:22px 0 8px;}
  .section-title:first-child{margin-top:0;}
  .analogy{
    font-family:'Fraunces',serif;font-style:italic;font-size:19px;line-height:1.5;color:var(--teal-deep);
    border-left:3px solid var(--amber);padding-left:16px;margin:8px 0 20px;
  }
  p{font-size:15px;line-height:1.65;color:var(--ink);margin:0 0 8px;}
  ul{margin:0 0 8px;padding-left:20px;}
  li{font-size:15px;line-height:1.65;color:var(--ink);margin-bottom:4px;}

  .traffic{display:flex;gap:10px;margin:6px 0 20px;flex-wrap:wrap;}
  .light{display:flex;align-items:center;gap:8px;font-size:13px;background:var(--paper);border-radius:20px;padding:6px 12px 6px 8px;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dot.green{background:var(--sage);} .dot.amber{background:var(--amber);} .dot.red{background:var(--coral);}

  .refs{list-style:none;padding:0;margin:8px 0 0;}
  .refs li{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink-soft);border-bottom:1px solid var(--line-soft);padding:8px 0;}

  .phase-row{display:flex;gap:14px;margin-bottom:10px;align-items:flex-start;}
  .phase-num{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--amber);width:20px;flex-shrink:0;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:14px;}

  @media (max-width:640px){
    .wrap{padding:24px 16px 70px;}
    header{flex-direction:column;}
    .panel{padding:22px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="mark">Threshold</span>
      <span class="sub">A physio education library</span>
    </div>
    <div class="dial-block">
      <div class="dial-labels">
        <span id="labelPatient">Patient</span>
        <span id="labelClinician">Clinician</span>
      </div>
      <svg id="dial" width="60" height="60" viewBox="0 0 120 120" onclick="toggleMode()">
        <circle class="dial-ring" cx="60" cy="60" r="46"></circle>
        <path id="dialArc" class="dial-arc" d=""></path>
        <g id="dialNeedle">
          <line x1="60" y1="60" x2="60" y2="24" stroke="#16302D" stroke-width="4" stroke-linecap="round"></line>
          <circle cx="60" cy="60" r="7" fill="#16302D"></circle>
        </g>
      </svg>
    </div>
  </header>

  <div class="hero">
    <h1>Same condition. Different volume.</h1>
    <p>Turn the dial to switch how each topic is explained — plain language for patients, or the evidence base clinicians want. Pick a topic below to start.</p>
  </div>

  <div class="grid-label">Topics</div>
  <div class="grid" id="grid"></div>

  <div class="panel" id="panel">
    <div class="panel-head">
      <h2 id="panelTitle"></h2>
      <span class="mode-pill" id="modePill"></span>
    </div>
    <div id="panelBody"></div>
  </div>

  <div class="empty-state" id="emptyState">Select a topic above to see it explained.</div>

</div>

<script>
const DATA = {
  tendinopathy: {
    tag: "Load / tissue",
    title: "Tendinopathy",
    patient: {
      analogy: "\u201cThink of your tendon like a donut, not a hole — we're building up healthy tissue around the sore spot, not just chasing the pain.\u201d",
      sections: [
        { h: "What's going on", p: "Your tendon is irritated from load it isn't used to yet — not damaged. Pain here is a signal to adjust load, not a sign to stop moving completely." },
        { h: "The traffic light rule", traffic: true },
        { h: "The 24-hour rule", p: "If pain from an activity hasn't settled back to its usual level within 24 hours, that activity was too much for now — dial it back next time, don't cut it out." },
        { h: "What helps", list: ["Gradual, consistent loading — little and often beats rest-then-binge", "Warming up before higher-intensity activity", "Sleep and stress management (both affect tendon sensitivity)"] }
      ]
    },
    clinician: {
      analogy: "\u201cDonut not the hole\u201d (Cook) — build capacity around the pathology rather than treating the lesion in isolation.",
      sections: [
        { h: "Mechanism", p: "Reactive-to-degenerative continuum (Cook & Purdam); pain relates to load tolerance, not solely to imaging findings — degenerative tendons are frequently asymptomatic." },
        { h: "Load management", list: ["Traffic-light system for activity selection based on 24hr pain response", "Isometric loading for acute pain relief, progressing to heavy slow resistance / isotonic", "Avoid compressive positions in insertional presentations (e.g. deep hip flexion in gluteal tendinopathy)"] },
        { h: "Key references", refs: ["Cook & Purdam (2009) — continuum model", "Rio et al. (2015) — isometric analgesia"] }
      ]
    }
  },
  acl: {
    tag: "Ligament / surgical",
    title: "ACL Rehabilitation",
    patient: {
      analogy: "\u201cWe're not just rebuilding the ligament — we're retraining your brain and muscles to trust the knee again.\u201d",
      sections: [
        { h: "What's going on", p: "After ACL injury or surgery, the muscles around your knee — especially quads — can 'switch off' as a protective reflex, even once healing is underway. That's normal, and it's what rehab specifically targets." },
        { h: "Why prehab matters", p: "Building strength and control before surgery (if you're having it) tends to lead to better outcomes afterward — it's easier to maintain function than to fully rebuild it." },
        { h: "What to expect", list: ["Early phase: swelling control, regaining full knee extension, quad activation", "Mid phase: progressive strength, balance and control work", "Late phase: sport-specific movement, cutting and landing, before return-to-sport testing"] }
      ]
    },
    clinician: {
      analogy: "Arthrogenic muscle inhibition — a spinal reflex response to joint effusion/damage — is a key early barrier, not a motivation issue.",
      sections: [
        { h: "Prehabilitation", p: "Pre-op strength and neuromuscular control (quad strength, single-leg hop symmetry) is associated with improved post-op outcomes and RTS timelines." },
        { h: "Phased criteria (not time-based)", list: ["Phase 1: effusion control, full passive extension, quad activation (NMES if indicated)", "Phase 2: closed-chain strengthening, gait normalisation, balance/proprioception", "Phase 3: plyometrics, cutting mechanics, sport-specific loading", "RTS: quad strength symmetry \u226590%, hop test symmetry \u226590%, psychological readiness (e.g. ACL-RSI)"] },
        { h: "Key references", refs: ["Kotsifaki et al. (2023) — RTS criteria", "Cunha & Solomon — prehab outcomes"] }
      ]
    }
  },
  ankle: {
    tag: "Ligament / acute",
    title: "Lateral Ankle Sprain",
    patient: {
      analogy: "\u201cMost ankle sprains heal well — but the ankle needs to relearn balance, not just settle down.\u201d",
      sections: [
        { h: "What's going on", p: "You've stretched or partially torn the ligaments on the outside of your ankle. Swelling and pain are part of normal healing, and most people recover full function with the right rehab." },
        { h: "Common mistake", p: "Resting until it 'feels normal' and skipping balance work — this is the biggest reason ankle sprains become recurring problems." },
        { h: "What helps", list: ["Early, protected movement rather than prolonged immobilisation", "Balance and proprioception exercises, even once pain has settled", "A brace or tape for higher-risk activities during the return-to-sport phase"] }
      ]
    },
    clinician: {
      analogy: "Recurrence risk is driven primarily by residual proprioceptive and neuromuscular deficits, not structural laxity alone.",
      sections: [
        { h: "Management (2021 JOSPT CPG)", list: ["Early mobilisation over immobilisation for grade I–II sprains", "Manual therapy + exercise therapy combined outperforms exercise alone", "Balance/proprioceptive training strongly recommended to reduce recurrence"] },
        { h: "Phased approach (Mattacola & Dwyer)", list: ["Phase 1: protection, effusion/pain control, early ROM", "Phase 2: progressive strength, proprioception on unstable surfaces", "Phase 3: sport-specific agility, cutting, reactive balance"] },
        { h: "Key references", refs: ["JOSPT CPG (2021) — lateral ankle sprain", "Mattacola & Dwyer — phased rehab protocol"] }
      ]
    }
  },
  adductor: {
    tag: "Muscle / groin",
    title: "Adductor Strain",
    patient: {
      analogy: "\u201cWe rebuild strength through the full range before asking the muscle to sprint, cut or kick again.\u201d",
      sections: [
        { h: "What's going on", p: "A strain means the muscle fibres have been overstretched or torn, usually from a sudden change of direction or kicking action. Groin strains are common in field sports and respond well to structured rehab." },
        { h: "What helps", list: ["Isometric holds early to manage pain and maintain strength", "Progressive strengthening through full range before high-speed work", "A graded return through jogging, sprinting, then cutting/kicking — not straight back to training"] }
      ]
    },
    clinician: {
      analogy: "Serner framework: staged progression through isometric \u2192 isotonic \u2192 sport-specific loading, criteria-based rather than time-based.",
      sections: [
        { h: "Phased protocol (Serner)", sections_phases: [
          "Isometric adduction, pain-free strength maintenance",
          "Isotonic strengthening (Copenhagen adduction progression), ROM restoration",
          "Sport-specific: change of direction, kicking, sprint mechanics under load" ] },
        { h: "Key references", refs: ["Serner et al. — adductor strain rehab framework"] }
      ]
    }
  },
  painscience: {
    tag: "Neuroscience",
    title: "Pain Science Basics",
    patient: {
      analogy: "\u201cPain is like a smoke alarm — sometimes it's set off by fire, but sometimes it's just overly sensitive, even when nothing is burning.\u201d",
      sections: [
        { h: "What's going on", p: "Pain doesn't always equal tissue damage. Your nervous system can turn the 'volume' of pain up or down based on threat, stress, sleep, and past experience — even after tissue has healed." },
        { h: "Why this matters", p: "Understanding this isn't about 'it's all in your head' — it's about knowing that hurt doesn't always mean harm, which can make movement feel safer again." },
        { h: "What helps", list: ["Gradual return to movement, even with some discomfort", "Addressing sleep, stress and fear around movement alongside physical treatment", "Pacing activity steadily rather than boom-bust cycles"] }
      ]
    },
    clinician: {
      analogy: "Predictive processing model: pain reflects the brain's threat appraisal, not a direct readout of nociception — central sensitisation lowers this threshold.",
      sections: [
        { h: "Mechanisms", list: ["Peripheral sensitisation: local nociceptor hypersensitivity following injury/inflammation", "Central sensitisation: increased CNS excitability, reduced descending inhibition", "Biopsychosocial dimensions: fear-avoidance, catastrophising, sleep disruption amplify pain experience"] },
        { h: "Clinical implications", list: ["Pain neuroscience education (PNE) as an adjunct to graded exposure", "Avoid over-medicalising benign imaging findings", "Address boom-bust activity patterns with graded, time-contingent pacing"] },
        { h: "Key references", refs: ["Beecher (1955) — context-dependent pain perception", "Levine et al. (1981) — endogenous opioid mechanisms", "Benedetti (2022) — placebo/nocebo neurobiology"] }
      ]
    }
  }
};

let mode = "patient";
let selected = null;

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  Object.entries(DATA).forEach(([key, d]) => {
    const card = document.createElement('div');
    card.className = 'card' + (selected===key ? ' selected' : '');
    card.onclick = () => { selected = key; render(); };
    card.innerHTML = `<span class="card-tag">${d.tag}</span><span class="card-title">${d.title}</span>`;
    grid.appendChild(card);
  });
}

function renderSection(s){
  if(s.traffic){
    return `<div class="section-title">${s.h}</div>
      <div class="traffic">
        <div class="light"><span class="dot green"></span>Mild, settles quickly — keep going</div>
        <div class="light"><span class="dot amber"></span>Moderate, settles within 24h — proceed with caution</div>
        <div class="light"><span class="dot red"></span>Sharp or lingers past 24h — back off</div>
      </div>`;
  }
  let body = '';
  if(s.p) body += `<p>${s.p}</p>`;
  if(s.list) body += `<ul>${s.list.map(i=>`<li>${i}</li>`).join('')}</ul>`;
  if(s.refs) body += `<ul class="refs">${s.refs.map(i=>`<li>${i}</li>`).join('')}</ul>`;
  if(s.sections_phases) body += s.sections_phases.map((p,i)=>`<div class="phase-row"><span class="phase-num">0${i+1}</span><p>${p}</p></div>`).join('');
  return `<div class="section-title">${s.h}</div>${body}`;
}

function render(){
  renderGrid();
  const panel = document.getElementById('panel');
  const empty = document.getElementById('emptyState');
  if(!selected){
    panel.classList.remove('visible');
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  panel.classList.add('visible');
  const d = DATA[selected];
  const view = d[mode];
  document.getElementById('panelTitle').textContent = d.title;
  const pill = document.getElementById('modePill');
  pill.textContent = mode === 'patient' ? 'Patient view' : 'Clinician view';
  pill.className = 'mode-pill ' + mode;
  document.getElementById('panelBody').innerHTML =
    `<div class="analogy">${view.analogy}</div>` +
    view.sections.map(renderSection).join('');
}

function toggleMode(){
  mode = mode === 'patient' ? 'clinician' : 'patient';
  document.getElementById('dialNeedle').style.transform = mode === 'clinician' ? 'rotate(60deg)' : 'rotate(0deg)';
  document.getElementById('labelPatient').classList.toggle('active', mode==='patient');
  document.getElementById('labelClinician').classList.toggle('active', mode==='clinician');
  document.getElementById('dialArc').setAttribute('stroke', mode==='clinician' ? '#DD7A3C' : '#2B5955');
  render();
}

// init
document.getElementById('labelPatient').classList.add('active');
render();
</script>
</body>
</html>
